name: Yad2 Health Check

on:
  schedule:
    # Once an hour at minute 7 - chosen to fall between the staggered scan
    # cron entries (at minutes 0, 5, 10, ...) so the health check doesn't
    # race the scan workflow when both fire on the same minute.
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: yad2-health-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore state from state branch
        run: |
          mkdir -p state
          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch origin state --depth=1
            git --work-tree=state checkout origin/state -- .
            echo "Restored state from origin/state"
          else
            echo "No state branch yet, starting with empty state"
          fi

      - name: Run health check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_NOTIFICATIONS_ENABLED: "true"
          PLAYWRIGHT_HEADLESS: "true"
          STATE_DIR: ${{ github.workspace }}/state
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: npm run health-check
