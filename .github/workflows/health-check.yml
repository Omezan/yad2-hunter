name: Yad2 Health Check

on:
  schedule:
    # Every 2 hours, at minute 7 of even hours (00:07, 02:07, ...). The
    # minute :07 offset is chosen to fall between the scan iterations
    # (which fire at :00 and :30) so the health-check doesn't race the
    # scan workflow on the same minute.
    - cron: "7 */2 * * *"
  workflow_dispatch:

concurrency:
  group: yad2-health-check
  cancel-in-progress: false

permissions:
  # Need write so that the health-check can push reconciled seen-ads.json
  # back to the `state` branch immediately when it closes a diff.
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore state from state branch
        run: |
          mkdir -p state
          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch origin state --depth=1
            git --work-tree=state checkout origin/state -- .
            echo "Restored state from origin/state"
          else
            echo "No state branch yet, starting with empty state"
          fi

      - name: Refresh state right before running
        # The looping scan job keeps pushing to `state` every ~5 minutes.
        # Refresh just before the live scrape so we start from the freshest
        # possible seen-set, minimizing race conditions.
        run: |
          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch origin state --depth=1
            git --work-tree=state checkout origin/state -- .
            echo "Re-restored state from origin/state"
          fi

      - name: Run health check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_NOTIFICATIONS_ENABLED: "true"
          PLAYWRIGHT_HEADLESS: "true"
          STATE_DIR: ${{ github.workspace }}/state
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          # Needed by scripts/persist-state.sh when the health-check decides
          # to reconcile a diff back into seen-ads.json.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npm run health-check
