name: Yad2 Scan

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: yad2-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore state from state branch
        run: |
          mkdir -p state
          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch origin state --depth=1
            git --work-tree=state checkout origin/state -- .
            echo "Restored state from origin/state"
          else
            echo "No state branch yet, starting fresh"
          fi

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_NOTIFICATIONS_ENABLED: "true"
          PLAYWRIGHT_HEADLESS: "true"
          STATE_DIR: ${{ github.workspace }}/state
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: npm run scan

      - name: Persist state to state branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [ ! -d state ] || [ -z "$(ls -A state 2>/dev/null)" ]; then
            echo "No state to persist"
            exit 0
          fi

          WORK_DIR="$(mktemp -d)"
          cp -R state/. "$WORK_DIR/"

          cd "$WORK_DIR"
          git init -q -b state
          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add .
          if git diff --cached --quiet; then
            echo "No state changes to push"
            exit 0
          fi
          git commit -q -m "Update Yad2 state ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push -f origin state
