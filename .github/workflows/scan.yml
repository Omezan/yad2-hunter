name: Yad2 Scan

on:
  schedule:
    # One job per hour; the job itself loops internally and scans every 5 min
    # for ~55 minutes. This avoids GitHub's free-tier scheduler dropping
    # individual cron fires under load.
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: yad2-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore state from state branch
        run: |
          mkdir -p state
          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch origin state --depth=1
            git --work-tree=state checkout origin/state -- .
            echo "Restored state from origin/state"
          else
            echo "No state branch yet, starting fresh"
          fi

      - name: Run scan loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_NOTIFICATIONS_ENABLED: "true"
          PLAYWRIGHT_HEADLESS: "true"
          STATE_DIR: ${{ github.workspace }}/state
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          # Stop the loop ~55 min after start so the job can finish cleanly
          # well before the 60-min runner timeout.
          LOOP_BUDGET_MS: "3300000"
          LOOP_INTERVAL_MS: "300000"
        run: npm run scan:loop

      - name: Persist final state to state branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATE_DIR: ${{ github.workspace }}/state
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: bash scripts/persist-state.sh
